services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pharma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharma_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pharma_shopper}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharma}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  wa-gateway:
    image: mimamch/wa-gateway:latest
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      KEY: ${WA_GATEWAY_KEY:-pharma_wa_key}
      WEBHOOK_BASE_URL: http://api:3000/webhooks/whatsapp
      REDIS_URL: redis://redis:6379
    volumes:
      - wa-credentials:/app/wa_credentials
      - wa-media:/app/media
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pharma}:${POSTGRES_PASSWORD:-pharma_secret}@db:5432/${POSTGRES_DB:-pharma_shopper}
      REDIS_URL: redis://redis:6379
      WA_GATEWAY_URL: http://wa-gateway:5001
      WA_GATEWAY_KEY: ${WA_GATEWAY_KEY:-pharma_wa_key}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pharma}:${POSTGRES_PASSWORD:-pharma_secret}@db:5432/${POSTGRES_DB:-pharma_shopper}
      REDIS_URL: redis://redis:6379
      WA_GATEWAY_URL: http://wa-gateway:5001
      WA_GATEWAY_KEY: ${WA_GATEWAY_KEY:-pharma_wa_key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db-data:
  redis-data:
  wa-credentials:
  wa-media:
